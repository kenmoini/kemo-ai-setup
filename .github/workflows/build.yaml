name: Build & Test

env:
  BUILD_CONTEXT_PATH: .
  CONTAINERFILE_PATH: Containerfile
  WORKFLOW_TRIGGER: 1
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      cache_breaker:
        type: string
        description: Cache Breaker
        default: "1"

jobs:
  # ----------------------------------------------------------------
  # Job 1: Build container image with all components enabled
  # ----------------------------------------------------------------
  container-build:
    name: Container Build (all components)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build container image
        run: |
          docker build \
            --build-arg ENABLE_GIT=true \
            --build-arg ENABLE_BUILD_ESSENTIALS=true \
            --build-arg ENABLE_NODEJS=true \
            --build-arg ENABLE_PNPM=true \
            --build-arg ENABLE_BUN=true \
            --build-arg ENABLE_CLAUDE_CODE=true \
            --build-arg ENABLE_CODEX=true \
            --build-arg ENABLE_GEMINI=true \
            --build-arg ENABLE_PYTHON=true \
            --build-arg ENABLE_GOLANG=true \
            --build-arg ENABLE_RUST=true \
            --build-arg ENABLE_PHP=true \
            --build-arg ENABLE_OPENJDK=true \
            --build-arg ENABLE_MAVEN=true \
            --build-arg ENABLE_GRADLE=true \
            --build-arg ENABLE_CODE_SERVER=true \
            -f Containerfile \
            -t kemo-ai-container:test .

      - name: Verify installed tools
        run: |
          docker run --rm kemo-ai-container:test bash -lc '
            echo "=== Tool Verification ==="
            set -e
            git --version
            gcc --version | head -1
            node --version
            npm --version
            pnpm --version
            bun --version
            claude --version || echo "claude: installed (version check may require auth)"
            codex --version || echo "codex: installed (version check may require auth)"
            gemini --version || echo "gemini: installed (version check may require auth)"
            pyenv --version
            pyenv exec python --version
            go version
            rustc --version
            php --version | head -1
            java -version 2>&1 | head -1
            mvn --version | head -1
            gradle --version 2>/dev/null | head -3
            code-server --version | head -1
            echo "=== All tools verified ==="
          '

  # ----------------------------------------------------------------
  # Job 2: Run install.sh on Ubuntu
  # ----------------------------------------------------------------
  ubuntu-install:
    name: Install Script (Ubuntu)
    runs-on: ubuntu-latest
    env:
      ENABLE_GIT: "true"
      ENABLE_BUILD_ESSENTIALS: "true"
      ENABLE_NODEJS: "true"
      ENABLE_PNPM: "true"
      ENABLE_BUN: "true"
      ENABLE_CLAUDE_CODE: "true"
      ENABLE_CODEX: "true"
      ENABLE_GEMINI: "true"
      ENABLE_PYTHON: "true"
      ENABLE_GOLANG: "true"
      ENABLE_RUST: "true"
      ENABLE_PHP: "true"
      ENABLE_OPENJDK: "true"
      ENABLE_MAVEN: "true"
      ENABLE_GRADLE: "true"
      ENABLE_CODE_SERVER: "true"
    steps:
      - uses: actions/checkout@v6

      - name: Run install script
        run: |
          chmod +x install.sh
          ./install.sh --force

      - name: Verify installed tools
        shell: bash -l {0}
        run: |
          echo "=== Tool Verification ==="
          git --version
          gcc --version | head -1
          node --version
          npm --version
          pnpm --version
          bun --version
          claude --version || echo "claude: installed (version check may require auth)"
          codex --version || echo "codex: installed (version check may require auth)"
          gemini --version || echo "gemini: installed (version check may require auth)"
          pyenv --version
          pyenv exec python --version
          go version
          rustc --version
          php --version | head -1
          java -version 2>&1 | head -1
          mvn --version | head -1
          gradle --version 2>/dev/null | head -3
          code-server --version | head -1
          echo "=== All tools verified ==="

  # ----------------------------------------------------------------
  # Job 3: Run install.sh on macOS
  # ----------------------------------------------------------------
  macos-install:
    name: Install Script (macOS)
    runs-on: macos-latest
    env:
      ENABLE_GIT: "true"
      ENABLE_BUILD_ESSENTIALS: "true"
      ENABLE_NODEJS: "true"
      ENABLE_PNPM: "true"
      ENABLE_BUN: "true"
      ENABLE_CLAUDE_CODE: "true"
      ENABLE_CODEX: "true"
      ENABLE_GEMINI: "true"
      ENABLE_PYTHON: "true"
      ENABLE_GOLANG: "true"
      ENABLE_RUST: "true"
      ENABLE_PHP: "true"
      ENABLE_OPENJDK: "true"
      ENABLE_MAVEN: "true"
      ENABLE_GRADLE: "true"
      ENABLE_CODE_SERVER: "true"
    steps:
      - uses: actions/checkout@v6

      - name: Run install script
        run: |
          brew install bash
          chmod +x install.sh
          ./install.sh --force

      - name: Verify installed tools
        shell: bash -l {0}
        run: |
          echo "=== Tool Verification ==="
          git --version
          gcc --version | head -1
          node --version
          npm --version
          pnpm --version
          bun --version
          claude --version || echo "claude: installed (version check may require auth)"
          codex --version || echo "codex: installed (version check may require auth)"
          gemini --version || echo "gemini: installed (version check may require auth)"
          pyenv --version
          pyenv exec python --version
          go version
          rustc --version
          php --version | head -1
          java -version 2>&1 | head -1
          mvn --version | head -1
          gradle --version 2>/dev/null | head -3
          code-server --version | head -1
          echo "=== All tools verified ==="
  # ----------------------------------------------------------------
  # Build the container for distribution and push to registry
  build:
    name: Build Container
    runs-on: ubuntu-latest
    needs:
      - container-build
      - ubuntu-install
      - macos-install
    # Sets the permissions granted to the `GITHUB_TOKEN` for the actions in this job.
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
          # - linux/s390x
          # - linux/ppc64le
    steps:
      - name: Prepare
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: "${{ env.REGISTRY }}"
          username: "${{ github.actor }}"
          password: "${{ secrets.GITHUB_TOKEN }}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Check out code
        uses: actions/checkout@v6

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          # list of Docker images to use as base name for tags
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          platforms: ${{ matrix.platform }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true
          context: ${{ env.BUILD_CONTEXT_PATH }}
          file: ${{ env.CONTAINERFILE_PATH }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            CACHE_BREAKER=${{ github.event.inputs.cache_breaker }}
          #push: true
          #provenance: false
          #platforms: linux/amd64, linux/arm64
          #provenance: mode=max
          #sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export digest
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    needs:
      - build
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Login to Container Registry
        uses: docker/login-action@v4
        with:
          registry: "${{ env.REGISTRY }}"
          username: "${{ github.actor }}"
          password: "${{ secrets.GITHUB_TOKEN }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=schedule
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=,suffix=,format=short
            type=sha,prefix=,suffix=,format=long
            type=raw,value=latest

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}